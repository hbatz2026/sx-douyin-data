name: 🎵 更新BGM推荐
on:
  schedule:
    - cron: '0 1 * * 1'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 生成BGM推荐
        run: node scripts/update-data.mjs bgm
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      - name: 提交推送
        run: |
          git config user.name "douyin-auto-bot"
          git config user.email "bot@douyin-lab.local"
          git add data/bgmList.js
          git diff --staged --quiet || git commit -m "auto: 更新BGM推荐 [$(date +%Y-%m-%d)]"
          git push
