# Gitee Go 流水线配置
# 在 Gitee 仓库中，路径为 .gitee/go/pipelines/ 下的 YAML 文件
# 三个流水线分别对应三个自动化任务

# ============================================
# 流水线 1: 更新选题库（每周一 9:00）
# ============================================
name: update-topics
displayName: 📚 更新选题库
triggers:
  schedule:
    - cron: '0 1 * * 1'  # UTC 1:00 = CST 9:00
stages:
  - name: build
    displayName: 生成数据
    jobs:
      - name: generate
        displayName: 调用 DeepSeek 生成
        steps:
          - name: install-deps
            uses: node
            with:
              version: '20'
            run: npm install --production
          - name: update-topics
            uses: node
            with:
              version: '20'
            run: node scripts/update-data.mjs topics
            env:
              DEEPSEEK_API_KEY: $DEEPSEEK_API_KEY
          - name: commit-push
            run: |
              git config user.name "douyin-auto-bot"
              git config user.email "bot@douyin-lab.local"
              git add data/topicPool.js data/t1Presets.js
              git diff --staged --quiet || git commit -m "auto: 更新选题库 [$(TZ=Asia/Shanghai date +%Y-%m-%d)]"
              git push

