name: 🔥 更新热点跟拍
on:
  schedule:
    - cron: '30 1 * * 1'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 生成热点跟拍
        run: node scripts/update-data.mjs hotspot
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      - name: 提交推送
        run: |
          git config user.name "douyin-auto-bot"
          git config user.email "bot@douyin-lab.local"
          git add data/hotspotData.js
          git diff --staged --quiet || git commit -m "auto: 更新热点跟拍 [$(date +%Y-%m-%d)]"
          git push
