name: update-hotspot
displayName: 🔥 更新热点跟拍
triggers:
  schedule:
    - cron: '30 1 * * 1'
stages:
  - name: update
    displayName: 生成数据
    jobs:
      - name: generate
        displayName: 生成热点跟拍
        steps:
          - name: checkout
            uses: checkout@1
          - name: setup-node
            uses: node-setup@1
            with:
              node-version: '20'
          - name: generate-data
            run: |
              node scripts/update-data.mjs hotspot
            env:
              DEEPSEEK_API_KEY: $DEEPSEEK_API_KEY
          - name: commit-push
            run: |
              git config user.name "douyin-auto-bot"
              git config user.email "bot@douyin-lab.local"
              git add data/hotspotData.js
              git diff --staged --quiet || git commit -m "auto: 更新热点跟拍 [$(date +%Y-%m-%d)]"
              git push
